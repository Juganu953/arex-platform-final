name: Deploy to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: arex-ltd-42154393-a701b-fce9f
  NODE_VERSION: '18'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Service Account from Secrets
        if: secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          echo "Setting up service account credentials from GitHub Secrets..."
          echo $GOOGLE_APPLICATION_CREDENTIALS_JSON | base64 --decode > firebase-service-account.json
          echo "✅ Service account key created from secrets"

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Deploying to Firebase project: $PROJECT_ID"
          firebase deploy \
            --token "$FIREBASE_TOKEN" \
            --project "$PROJECT_ID" \
            --non-interactive

      - name: Cleanup (Remove sensitive files)
        if: always()
        run: |
          echo "Cleaning up sensitive files..."
          rm -f firebase-service-account.json
