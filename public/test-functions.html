<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase Functions</title>
</head>
<body>
    <h1>Firebase Functions Test</h1>
    <button onclick="testFunction()">Test Function</button>
    <pre id="result"></pre>
    
    <script>
        async function testFunction() {
            const response = await fetch('https://us-central1-arex-ltd-42154393-a701b-fce9f.cloudfunctions.net/working');
            const data = await response.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
        
        // Auto-test on load
        testFunction();
    </script>
</body>
</html>
